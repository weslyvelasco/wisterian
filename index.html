<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisterian | Dynamic Collective</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #a855f7;
            --bg: #030014;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg); color: var(--text-main);
            overflow-x: hidden; scroll-behavior: smooth;
        }

        #viewer {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center; z-index: 5000;
            cursor: zoom-out;
        }
        #viewer img { max-width: 90%; max-height: 85vh; border-radius: 12px; border: 1px solid var(--border); }

        .nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; position: fixed; width: 100%; top: 0; z-index: 100;
            background: rgba(3, 0, 20, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        .nav a { color: var(--text-dim); text-decoration: none; margin-left: 25px; font-size: 14px; transition: 0.3s; }
        .nav a:hover { color: var(--primary); }

        .hero { padding: 180px 10% 80px; text-align: center; }
        #groupImg { width: 160px; height: 160px; border-radius: 35px; border: 2px solid var(--primary); object-fit: cover; cursor: pointer; }

        .section-padding { padding: 80px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; }

        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 20px; text-align: center; position: relative; }
        .card img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; cursor: pointer; margin-bottom: 15px; border: 2px solid transparent; transition: 0.3s; }
        .card img:hover { border-color: var(--primary); }

        .project-card { border-radius: 15px; overflow: hidden; background: var(--card-bg); border: 1px solid var(--border); }
        .project-card img { width: 100%; height: 180px; object-fit: cover; cursor: pointer; transition: 0.5s; }

        #adminPanel {
            position: fixed; left: 20px; bottom: 20px; width: 340px; height: 80vh;
            background: #0d0b1f; border: 1px solid var(--primary); border-radius: 15px;
            padding: 20px; z-index: 2000; display: none; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }
        .admin-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); }
        h4 { margin: 0 0 10px 0; font-size: 12px; color: var(--primary); letter-spacing: 1px; }
        input, textarea { width: 100%; background: #16142e; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 700; transition: 0.3s; }
        .btn-sm { padding: 6px 12px; font-size: 11px; margin-top: 5px; }

        .contact-bar { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .social-circle { width: 50px; height: 50px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; transition: 0.3s; }
        .social-circle:hover { background: var(--primary); transform: translateY(-5px); }

        #entry { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="viewer" onclick="this.style.display='none'"><img id="viewerImg" src=""></div>

<div id="entry">
    <h1 style="font-size: 50px; font-weight: 800;">Wisterian</h1>
    <div style="display: flex; gap: 15px;">
        <button class="btn" onclick="start(false)" style="width: 140px;">View Site</button>
        <button class="btn" onclick="start(true)" style="width: 140px; background: #16142e; border: 1px solid var(--primary);">Admin</button>
    </div>
</div>

<div id="site" style="display:none">
    <nav class="nav">
        <div style="font-weight: 800; font-size: 22px;">W.</div>
        <div>
            <a href="#home">Home</a>
            <a href="#team">Team</a>
            <a href="#projects">Work</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section id="home" class="hero" data-aos="fade-down">
        <img id="groupImg" onclick="view(this.src)">
        <h1 id="siteTitle" style="font-size: clamp(35px, 7vw, 65px); margin: 20px 0 10px;"></h1>
        <p id="siteDesc" style="max-width: 650px; margin: auto; color: var(--text-dim); font-size: 18px;"></p>
    </section>

    <section id="team" class="section-padding">
        <h2 style="margin-bottom: 40px;">The Collective</h2>
        <div class="grid" id="teamGrid"></div>
    </section>

    <section id="projects" class="section-padding" style="background: rgba(255,255,255,0.01)">
        <h2 style="margin-bottom: 40px;">Recent Projects</h2>
        <div class="grid" id="projectGrid"></div>
    </section>

    <section id="contact" class="section-padding" style="text-align: center;">
        <h2>Get In Touch</h2>
        <div class="contact-bar">
            <a href="#" id="linkFB" target="_blank" class="social-circle"><i class="fab fa-facebook-f"></i></a>
            <a href="#" id="linkIG" target="_blank" class="social-circle"><i class="fab fa-instagram"></i></a>
            <a href="#" id="linkEmail" class="social-circle"><i class="fa-regular fa-envelope"></i></a>
        </div>
    </section>
</div>

<div id="adminPanel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin:0">Editor Suite</h3>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--text-dim); cursor:pointer;">Exit</button>
    </div>

    <div class="admin-box">
        <h4>General Branding</h4>
        <input id="inTitle" placeholder="Brand Name">
        <textarea id="inDesc" placeholder="Description" rows="3"></textarea>
        <input id="inFB" placeholder="Facebook URL">
        <input id="inIG" placeholder="Instagram URL">
        <input id="inEmail" placeholder="Email Address">
        <label style="font-size: 10px;">Hero Image:</label>
        <input type="file" onchange="uploadImg(event, 'hero')">
    </div>

    <div class="admin-box">
        <h4>Add Team Member</h4>
        <input id="addMName" placeholder="Full Name">
        <input id="addMRole" placeholder="Role/Title">
        <input type="file" onchange="uploadImg(event, 'newMember')">
        <button class="btn btn-sm" onclick="insertMember()">+ Insert Member</button>
    </div>

    <div class="admin-box">
        <h4>Add Project</h4>
        <input id="addPTitle" placeholder="Project Name">
        <input type="file" onchange="uploadImg(event, 'newProject')">
        <button class="btn btn-sm" onclick="insertProject()">+ Insert Project</button>
    </div>

    <div class="admin-box">
        <h4>Quick Delete</h4>
        <div id="deleteList" style="font-size: 11px;"></div>
    </div>

    <button class="btn" style="margin-bottom: 8px;" onclick="save()">1. Save Changes Locally</button>
    <button class="btn" style="background: #22c55e;" onclick="exportCode()">2. Export Updated File</button>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script id="masterScript">
    AOS.init();
    
    // THE MASTER DATA - DO NOT DELETE THIS COMMENT
    let data = {
        title: "Wisterian Collective",
        desc: "A premium collaborative space for student researchers and digital creators.",
        hero: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=600",
        social: { fb: "#", ig: "#", mail: "contact@wisterian.com" },
        members: [{id: 1, name: "Admin User", role: "Founder", img: "https://i.pravatar.cc/150?u=9"}],
        projects: [{id: 1, title: "Initial Prototype", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=500"}]
    };

    // Load from memory if available
    const saved = localStorage.getItem("wisterian_final");
    if(saved) data = JSON.parse(saved);

    let temp = {};

    function start(isAdmin) {
        if(isAdmin && prompt("Code:") !== "1234") return;
        if(isAdmin) {
            document.getElementById('adminPanel').style.display = 'block';
            syncAdminForm();
        }
        document.getElementById('entry').style.display = 'none';
        document.getElementById('site').style.display = 'block';
        render();
    }

    function render() {
        document.getElementById('siteTitle').innerText = data.title;
        document.getElementById('siteDesc').innerText = data.desc;
        document.getElementById('groupImg').src = data.hero;
        document.getElementById('linkFB').href = data.social.fb;
        document.getElementById('linkIG').href = data.social.ig;
        document.getElementById('linkEmail').href = `mailto:${data.social.mail}`;

        const tGrid = document.getElementById('teamGrid');
        const dList = document.getElementById('deleteList');
        tGrid.innerHTML = ""; dList.innerHTML = "<b>Members:</b><br>";
        data.members.forEach(m => {
            tGrid.innerHTML += `<div class="card"><img src="${m.img}" onclick="view('${m.img}')"><h3>${m.name}</h3><p style="color:var(--primary)">${m.role}</p></div>`;
            dList.innerHTML += `<div onclick="removeItem('m', ${m.id})" style="cursor:pointer; color:#ef4444; margin: 3px 0;">[x] ${m.name}</div>`;
        });

        const pGrid = document.getElementById('projectGrid');
        pGrid.innerHTML = ""; dList.innerHTML += "<br><b>Projects:</b><br>";
        data.projects.forEach(p => {
            pGrid.innerHTML += `<div class="project-card"><img src="${p.img}" onclick="view('${p.img}')"><div style="padding:15px"><h4>${p.title}</h4></div></div>`;
            dList.innerHTML += `<div onclick="removeItem('p', ${p.id})" style="cursor:pointer; color:#ef4444; margin: 3px 0;">[x] ${p.title}</div>`;
        });
    }

    function syncAdminForm() {
        document.getElementById('inTitle').value = data.title;
        document.getElementById('inDesc').value = data.desc;
        document.getElementById('inFB').value = data.social.fb;
        document.getElementById('inIG').value = data.social.ig;
        document.getElementById('inEmail').value = data.social.mail;
    }

    function uploadImg(e, key) {
        const reader = new FileReader();
        reader.onload = () => { temp[key] = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    }

    function insertMember() {
        const name = document.getElementById('addMName').value;
        const role = document.getElementById('addMRole').value;
        if(!name || !temp.newMember) return alert("Need name and image");
        data.members.push({ id: Date.now(), name, role, img: temp.newMember });
        temp.newMember = null; render();
    }

    function insertProject() {
        const title = document.getElementById('addPTitle').value;
        if(!title || !temp.newProject) return alert("Need title and image");
        data.projects.push({ id: Date.now(), title, img: temp.newProject });
        temp.newProject = null; render();
    }

    function removeItem(type, id) {
        if(type === 'm') data.members = data.members.filter(x => x.id !== id);
        else data.projects = data.projects.filter(x => x.id !== id);
        render();
    }

    function save() {
        data.title = document.getElementById('inTitle').value;
        data.desc = document.getElementById('inDesc').value;
        data.social.fb = document.getElementById('inFB').value;
        data.social.ig = document.getElementById('inIG').value;
        data.social.mail = document.getElementById('inEmail').value;
        if(temp.hero) data.hero = temp.hero;

        localStorage.setItem("wisterian_final", JSON.stringify(data));
        alert("Changes saved to browser memory! Click 'Export' to get your new file.");
        render();
    }

    function exportCode() {
        const fullHTML = document.documentElement.outerHTML;
        const dataString = `let data = ${JSON.stringify(data, null, 8)};`;
        const finalContent = fullHTML.replace(/let data = \{[\s\S]*?\};/, dataString);
        
        const blob = new Blob([finalContent], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'index.html';
        a.click();
    }

    function view(url) {
        document.getElementById('viewerImg').src = url;
        document.getElementById('viewer').style.display = 'flex';
    }
</script>
</body>
</html>
